<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAL랭 페스티벌</title>

    <link rel="stylesheet" type="text/css" href="assets/css/reset.css">
    <link rel="stylesheet" type="text/css" href="https://lolstatic-a.akamaihd.net/webfonts/live/css/valorant/fonts.css">
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">

    <script src="assets/js/lib/jquery-1.12.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/4.4.2/pixi.min.js"></script>
    <script defer="defer" src="https://cdn.rgpub.io/public/live/riotbar/latest/kr-valorant-evergreen.ko_KR.js"></script><!-- 라이엇바 상하단 js -->

</head>
<body>

    <!-- 라이엇바 상단 -->
    <header id="riotbar-header"></header>
    <header id="top-menu"></header>

    <div class="wrap">
        <div class="errorPage">
            <div id="js-canvas-wrapper" class="canvas-wrapper"></div>
            <div class="visual"><img src="assets/images/img_error_visual.png" alt="VAL랭 페스티벌"></div>
            <p>
                지금은 준비 중입니다.<br />
                이용에 불편을 드려 죄송합니다.
            </p>
        </div><!-- errorPage end -->
    </div><!-- wrap end -->

    <!-- 라이엇바 하단 -->
    <footer id="riotbar-footer"></footer>
    <script defer="defer" src="https://cdn.rgpub.io/public/live/riotbar/latest/kr-valorant-evergreen.ko_KR.js"></script><!-- 라이엇바 상하단 js -->

    <script>
    // 비주얼 wave script
    (function() {
        
        window.CanvasSlideshow = function( options ) {

            var that  =   this;
            options                     = options || {};
            options.stageWidth          = options.hasOwnProperty('stageWidth') ? options.stageWidth : 2560;
            options.stageHeight         = options.hasOwnProperty('stageHeight') ? options.stageHeight : 1080;
            options.pixiSprites         = options.hasOwnProperty('sprites') ? options.sprites : [];
            options.centerSprites       = options.hasOwnProperty('centerSprites') ? options.centerSprites : false;
            options.autoPlay            = options.hasOwnProperty('autoPlay') ? options.autoPlay : true;
            options.autoPlaySpeed       = options.hasOwnProperty('autoPlaySpeed') ? options.autoPlaySpeed : [10, 3];
            options.fullScreen          = options.hasOwnProperty('fullScreen') ? options.fullScreen : true;
            options.displacementImage   = options.hasOwnProperty('displacementImage') ?     options.displacementImage : '';
            options.displaceAutoFit     = options.hasOwnProperty('displaceAutoFit')  ?  options.displaceAutoFit : false; 
            options.wacky               = options.hasOwnProperty('wacky') ? options.wacky : false;
            options.interactive         = options.hasOwnProperty('interactive') ? options.interactive : false;
            options.interactionEvent    = options.hasOwnProperty('interactionEvent') ? options.interactionEvent : '';
            options.displacementCenter  = options.hasOwnProperty('displacementCenter') ? options.displacementCenter : false;
            options.dispatchPointerOver = options.hasOwnProperty('dispatchPointerOver') ? options.dispatchPointerOver : false;

            //  PIXI VARIABLES
            /// ---------------------------    
            var renderer            = new PIXI.autoDetectRenderer( options.stageWidth, options.stageHeight, { transparent: true });
            var stage               = new PIXI.Container();
            var slidesContainer     = new PIXI.Container();
            var displacementSprite  = new PIXI.Sprite.fromImage( options.displacementImage );
            var displacementFilter  = new PIXI.filters.DisplacementFilter( displacementSprite );

            /// ---------------------------
            //  INITIALISE PIXI
            /// ---------------------------      
            this.initPixi = function() {

            // Add canvas to the HTML
            //document.body.appendChild( renderer.view );
            document.getElementById('js-canvas-wrapper').appendChild(renderer.view);

            // Add child container to the main container 
            stage.addChild( slidesContainer );

            // Enable Interactions
            stage.interactive = true; 

            // Fit renderer to the screen
            if ( options.fullScreen === true ) {
                renderer.view.style.objectFit = 'cover';
                renderer.view.style.width     = '100%';
                renderer.view.style.height    = '100%';
                renderer.view.style.top       = '50%';
                renderer.view.style.left      = '50%';
                renderer.view.style.webkitTransform = 'translate( -50%, -50% ) scale(1.05)';
                renderer.view.style.transform = 'translate( -50%, -50% ) scale(1.05)';           
            } else {
                renderer.view.style.maxWidth  = '100%';
                renderer.view.style.top       = '50%';
                renderer.view.style.left      = '50%';
                renderer.view.style.webkitTransform = 'translate( -50%, -50% )';
                renderer.view.style.transform = 'translate( -50%, -50% )';          
            }

            displacementSprite.texture.baseTexture.wrapMode = PIXI.WRAP_MODES.REPEAT;

            // Set the filter to stage and set some default values for the animation
            stage.filters = [displacementFilter];        

            if ( options.autoPlay === false ) {
                displacementFilter.scale.x = 0;
                displacementFilter.scale.y = 0;
            }

            if ( options.wacky === true ) {

                displacementSprite.anchor.set(0.5);
                displacementSprite.x = renderer.width / 2;
                displacementSprite.y = renderer.height / 2; 
            }

            displacementSprite.scale.x = 2;
            displacementSprite.scale.y = 2;

            // PIXI tries to fit the filter bounding box to the renderer so we optionally bypass
            displacementFilter.autoFit = options.displaceAutoFit;

            stage.addChild( displacementSprite );

            };

            /// ---------------------------
            //  LOAD SLIDES TO CANVAS
            /// ---------------------------          
            this.loadPixiSprites = function( sprites ) {

            var rSprites = options.sprites;

            for ( var i = 0; i < rSprites.length; i++ ) {

                var texture   = new PIXI.Texture.fromImage( sprites[i] );
                var image     = new PIXI.Sprite( texture );

                if ( options.centerSprites === true ) {
                image.anchor.set(0.5);
                image.x = renderer.width / 2;
                image.y = renderer.height / 2;            
                }

                slidesContainer.addChild( image );

            } 

            };

            /// ---------------------------
            //  DEFAULT RENDER/ANIMATION
            /// ---------------------------        
            if ( options.autoPlay === true ) {

            var ticker = new PIXI.ticker.Ticker();

            ticker.autoStart = options.autoPlay;

            ticker.add(function( delta ) {

                displacementSprite.x += options.autoPlaySpeed[0] * delta;
                displacementSprite.y += options.autoPlaySpeed[1];
                renderer.render( stage );

            });

            }  else {

            var render = new PIXI.ticker.Ticker();

            render.autoStart = true;

            render.add(function( delta ) {
                renderer.render( stage );
            });        

            }    

            /// ---------------------------
            //  INIT FUNCTIONS
            /// ---------------------------    

            this.init = function() {
            that.initPixi();
            that.loadPixiSprites( options.pixiSprites );
            };

            /// ---------------------------
            //  START 
            /// ---------------------------           
            this.init();
        };
    })();

    var spriteImagesSrc = [];
    spriteImagesSrc.push('assets/images/bg_error.jpg');

    var initCanvasSlideshow = new CanvasSlideshow({
        sprites: spriteImagesSrc,
        displacementImage: 'https://raw.githubusercontent.com/Pierrinho/elephant/master/pattern-clouds.jpg',
        autoPlay: true,
        autoPlaySpeed: [0, 6],
        interactive: false,
        interactionEvent: 'click', // 'click', 'hover', 'both' 
        displaceAutoFit: false,
        dispatchPointerOver: true // restarts pointerover event after click 
    });
    </script>
</body>
</html>
